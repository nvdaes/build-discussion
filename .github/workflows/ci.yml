name: Continuous Integration

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    permissions:
      discussions: write

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          category-position: 1
          title: Test Discussion from CLI Action
          body: |
            Hello from the GitHub CLI composite action!

            This discussion was created using the gh CLI implementation
            instead of the JavaScript version.

      - name: Print Output
        id: output
        run: |
          echo "ID: ${{ steps.test-action.outputs.discussion-id }}"
          echo "URL: ${{ steps.test-action.outputs.discussion-url }}"
          echo "Number: ${{ steps.test-action.outputs.discussion-number }}"
